# KAMP (Klipper Adaptive Meshing & Purging) - Universal Settings

[gcode_macro _KAMP_Settings]
variable_verbose_enable: True 
variable_mesh_margin: 0
gcode:

# --- UNIVERSAL ADAPTIVE MESH (With Dynamic Probe Count) ---
[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE_BASE
gcode:
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
    
    # Check if we have AREA_START/END from slicer or macro call
    {% set area_start = params.AREA_START | default(None) %}
    {% set area_end = params.AREA_END | default(None) %}

    {% if all_points %}
        # Use KAMP automatic detection (works with Label Objects)
        {% set x_min = all_points | map(attribute=0) | min %}
        {% set y_min = all_points | map(attribute=1) | min %}
        {% set x_max = all_points | map(attribute=0) | max %}
        {% set y_max = all_points | map(attribute=1) | max %}
        { action_respond_info("KAMP: Using Object Labels for mesh area.") }
    {% elif area_start and area_end and area_start != "0,0" and area_end != "0,0" %}
        # Use manual coordinates from Cura plugin (only if valid)
        {% set x_min = area_start.split(',')[0]|float %}
        {% set y_min = area_start.split(',')[1]|float %}
        {% set x_max = area_end.split(',')[0]|float %}
        {% set y_max = area_end.split(',')[1]|float %}
        { action_respond_info("KAMP: Using Manual Area Coordinates for mesh area.") }
    {% else %}
        # Fallback to standard mesh
        {% set x_min = None %}
    {% endif %}

    {% if x_min is not none %}
        # Get Mesh Settings from printer.cfg
        {% set mesh_config = printer.configfile.settings.bed_mesh %}
        {% set safe_min_x = mesh_config.mesh_min[0] %}
        {% set safe_min_y = mesh_config.mesh_min[1] %}
        {% set safe_max_x = mesh_config.mesh_max[0] %}
        {% set safe_max_y = mesh_config.mesh_max[1] %}

        # Clamp coordinates to safe mesh range
        {% set x_min = [x_min, safe_min_x] | max %}
        {% set y_min = [y_min, safe_min_y] | max %}
        {% set x_max = [x_max, safe_max_x] | min %}
        {% set y_max = [y_max, safe_max_y] | min %}

        # --- DYNAMIC PROBE COUNT CALCULATION ---
        # Aim for roughly 1 probe every 30mm, min 3x3, max 9x9
        {% set x_points = ((x_max - x_min) / 30) | round(0) | int %}
        {% set y_points = ((y_max - y_min) / 30) | round(0) | int %}
        
        {% set x_points = [x_points, 3] | max %}
        {% set x_points = [x_points, 9] | min %}
        {% set y_points = [y_points, 3] | max %}
        {% set y_points = [y_points, 9] | min %}

        { action_respond_info("KAMP: Probing %dx%d mesh." % (x_points, y_points)) }

        _BED_MESH_CALIBRATE_BASE mesh_min={x_min},{y_min} mesh_max={x_max},{y_max} probe_count={x_points},{y_points}
    {% else %}
        { action_respond_info("KAMP: No area found or objects not labeled. Standard Mesh.") }
        _BED_MESH_CALIBRATE_BASE
    {% endif %}

# --- UNIVERSAL LINE PURGE (With Safety Margins) ---
[gcode_macro LINE_PURGE]
gcode:
    # Use params.AREA_START if it exists, otherwise use a safe default (like 10,10)
    {% set start_coords = params.AREA_START.split(',') if params.AREA_START else ["10", "10"] %}
    {% set x_origin = start_coords[0]|float %}
    {% set y_origin = start_coords[1]|float %}
    
    # Get printer limits
    {% set x_max = printer.toolhead.axis_maximum.x - 5 %}
    {% set y_max = printer.toolhead.axis_maximum.y - 5 %}

    # Set safe starting point
    {% set safe_y = [y_origin - 5, 5] | max %}
    {% set safe_x = [x_origin, 5] | max %}

    # Ensure the 50mm purge line stays within the bed limits
    {% if safe_x + 50 > x_max %}
        {% set safe_x = x_max - 50 %}
    {% endif %}
    # Re-check minimum after potential shift
    {% set safe_x = [safe_x, 5] | max %}

    SAVE_GCODE_STATE NAME=LINE_PURGE_state
    M117 Purging...
    G90
    G1 Z5 F3000
    G1 X{safe_x} Y{safe_y} F5000    ; Move to safe start point
    G1 Z0.8 F3000                   ; Increased height to 0.8mm to prevent scratching
    G91
    G1 X50 E15 F1200                ; Prime line
    G1 Y1 E1 F1200                  ; Step over
    G1 X-50 E15 F1200               ; Second line
    G90
    G1 Z5 F3000
    RESTORE_GCODE_STATE NAME=LINE_PURGE_state
