[include mainsail.cfg]
[include KAMP_Settings.cfg]

[exclude_object]

[gcode_arcs]
resolution: 1.0

# This file contains pin mappings for the stock 2020 Creality Ender 3
# V2. To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PC2
dir_pin: PB92104
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 245
homing_speed: 100

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 100

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_min: -4
position_max: 250

[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -42
y_offset: -10
#z_offset: 0
stow_on_each_sample: FALSE # PIN STAYS DOWN between points (Saves extreme amount of time!)
probe_with_touch_mode: True

[safe_z_home]
#home_xy_position: 117.5, 117.5
home_xy_position: 159.5, 127.5
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 200
horizontal_move_z: 3
mesh_min: 15,15
mesh_max: 188,191
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

[extruder]
pressure_advance: 0.54
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 100.0
max_extrude_cross_section: 5
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 28.67
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# tuned for stock hardware with 200 degree Celsius target
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 250

[screws_tilt_adjust]
screw1: 70.5,37.5
screw1_name: front left screw
screw2: 240,37.5
screw2_name: front right screw
screw3: 240,207.5
screw3_name: rear right screw
screw4: 70.5,207.5
screw4_name: rear left screw
horizontal_move_z: 5
speed: 250
screw_thread: CW-M4

[input_shaper]
shaper_freq_x: 56
shaper_freq_y: 53

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 50 degree Celsius target
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 10
max_temp: 70

[fan]
pin: PA0

[respond]

[display_status]

[pause_resume]

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
minimum_cruise_ratio: 0.0
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0


######################################################################
# MACROS
######################################################################

[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(55)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(205)|float %}
  
  M117 Heating bed...
  M190 S{BED_TEMP}             ; Wait until bed reaches temperature
  
  G90                          ; Absolute coordinates
  G28                          ; Home all axes
  
  M117 Adaptive Meshing...
  # Pass area parameters only if they are actually provided by the slicer
  {% if params.AREA_START and params.AREA_END %}
    BED_MESH_CALIBRATE AREA_START={params.AREA_START} AREA_END={params.AREA_END}
  {% else %}
    BED_MESH_CALIBRATE
  {% endif %}
  
  G1 Z10 F3000                 ; Lift nozzle safely
  
  M117 Heating nozzle...
  M109 S{EXTRUDER_TEMP}        ; Wait until nozzle has printing temperature
  
  M117 Adaptive Purging...
  {% if params.AREA_START and params.AREA_END %}
    LINE_PURGE AREA_START={params.AREA_START} AREA_END={params.AREA_END}
  {% else %}
    LINE_PURGE
  {% endif %}
  
  M117 Printing...

[gcode_macro END_PRINT]
gcode:
  # Turn off bed, extruder, and fan
  M140 S0
  M104 S0
  M106 S0
  # Move nozzle away from print while retracting
  G91
  G1 X-2 Y-2 E-3 F300
  G1 Z50 F3000 # Raise nozzle
  G90 #Absolute positioning
  G1 X0 Y230 #Present print
  M84 #Disable all steppers

[gcode_macro CALIBRATE_Z_OFFSET]
description: Home and start Z-offset calibration
gcode:
    G28
    PROBE_CALIBRATE

[gcode_macro CHECK_BED_LEVEL]
description: Check bed level at the 4 adjustment screws
gcode:
    G28
    SCREWS_TILT_CALCULATE

[gcode_macro SAVE_SETTINGS]
description: Save configuration changes and restart
gcode:
    SAVE_CONFIG

[gcode_macro REPORT_SPEED]
description: Report current speed and volumetric flow in the console
gcode:
    {% set velocity = printer.toolhead.velocity %}
    {% set filament_diameter = printer.configfile.settings.extruder.filament_diameter %}
    {% set flow = printer.extruder.velocity * (3.14159 * (filament_diameter / 2) ** 2) %}
    { action_respond_info("Speed: %.2f mm/s | Flow: %.2f mm³/s" % (velocity, flow)) }

[gcode_macro BLTOUCH_RESET]
gcode:
    BLTOUCH_DEBUG COMMAND=reset

[gcode_macro BLTOUCH_PIN_DOWN]
gcode:
    BLTOUCH_DEBUG COMMAND=pin_down

[gcode_macro BLTOUCH_PIN_UP]
gcode:
    BLTOUCH_DEBUG COMMAND=pin_up

[gcode_macro CHECK_PROBE]
gcode:
    QUERY_PROBE

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  ##### set defaults #####
  {% set x = params.X|default(230) %}      #edit to your park position
  {% set y = params.Y|default(230) %}      #edit to your park position
  {% set z = params.Z|default(10)|float %} #edit to your park position
  {% set e = params.E|default(1) %}        #edit to your retract length
  ##### calculate safe lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% set lift_z = z|abs %}
  {% if act_z < (max_z - lift_z) %}
      {% set z_safe = lift_z %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{e} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}    
    G1 Z{z_safe}
    G90
    G1 X{x} Y{y} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### set defaults #####
  {% set e = params.E|default(1) %} #edit to your retract length
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E{e} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    CANCEL_PRINT_BASE

[gcode_macro FILAMENT_CHANGE]
description: Filament change
gcode:
    PAUSE
    UNLOAD_FILAMENT

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set speed = params.SPEED|default(300) %}
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E50 F{speed} # fast-load
    G1 E25 F150 # purge
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set speed = params.SPEED|default(300) %}
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E5 F3000 # quick extrude to avoid blob
    G1 E-80 F{speed} # retract all the way
    RESTORE_GCODE_STATE NAME=unload_state

[firmware_retraction]
retract_length: 3.0
retract_speed: 40
unretract_extra_length: 0.04
unretract_speed: 40

[include moonraker_obico_macros.cfg]

